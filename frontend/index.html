<html lang='en'>
    <head>
        <meta charset='UTF-8' />
        <meta name='viewport' content='width=device-width, initial-scale=1.0' />
        <meta name='theme-color' content='#10b981' />
        <meta name='apple-mobile-web-app-capable' content='yes' />
        <meta name='apple-mobile-web-app-status-bar-style' content='default' />
        <meta name='apple-mobile-web-app-title' content='MediFind' />
        <link rel='manifest' href='/manifest.json' />
        <link rel='apple-touch-icon' href='/assets/generated/medifind-icon.dim_192x192.png' />
        <title>MediFind</title>
        <script>
          // Capture beforeinstallprompt as early as possible, before React mounts.
          // React's useEffect runs too late and misses this event on fast devices.
          window.__installPrompt = null;
          window.addEventListener('beforeinstallprompt', function(e) {
            e.preventDefault();
            window.__installPrompt = e;
            // Notify any already-mounted React listeners
            window.dispatchEvent(new Event('installpromptready'));
          });

          if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
              navigator.serviceWorker.register('/sw.js').catch(function() {});
            });
          }
        </script>
    </head>
    <body>
        <div id='root'></div>
        <script type='module' src='/src/main.tsx'></script>
    </body>
</html>
